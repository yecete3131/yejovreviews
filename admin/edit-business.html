<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Business</title>
  <link rel="stylesheet" href="admin.css?v=4">
</head>

<body>

  <div class="admin-card">
    <h1>Edit Business</h1>
    <p id="editBusinessId">Loading...</p>

    <input id="name" placeholder="Business Name">
    <input id="tagline" placeholder="Tagline">
    <input id="google" placeholder="Google Review URL">
    <input id="instagram" placeholder="Instagram URL">
    <input id="facebook" placeholder="Facebook URL">
    <input id="website" placeholder="Website URL">
    <input id="whatsapp" placeholder="WhatsApp URL">
    <input id="phone" placeholder="Phone: +971500000000">
    <input id="location" placeholder="Google Maps URL">
    <input id="logo" placeholder="Logo URL or assets/logo.png">

    <button id="updateBusinessBtn">Update Business</button>

    <p id="status"></p>

    <a class="admin-link" href="dashboard.html">Back to Dashboard</a>
  </div>

  <script type="module" src="admin.js?v=4"></script>

</body>
</html>
